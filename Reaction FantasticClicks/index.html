<!DOCTYPE html>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    user-select:none;
    
    -webkit-user-select: none;
-ms-user-select: none;
user-select: none;
-webkit-touch-callout: none;
}

#gameBox{text-align:center;}

#reactionArea{
    width:280px; /* smaller for more pillar space */
    height:180px;
    margin:20px auto;
    border-radius:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.waiting{ background:#222; }
.ready{ background:#0a0; }
.fakeReady{ background:#aa0000; }
.tooSoon{ background:#a00; }
.result{ background:#222; }
.warningLava{
background:linear-gradient(45deg,#330000,#ff2200);
color:#fff;
font-weight:bold;
text-shadow:0 0 10px red,0 0 20px orange,0 0 40px red;

animation:lavaPulse 0.7s infinite alternate;
}

@keyframes lavaPulse{

0%{
transform:scale(1);
box-shadow:0 0 10px red inset,0 0 20px red;
}

50%{
transform:scale(1.05);
box-shadow:0 0 25px orange inset,0 0 40px red;
}

100%{
transform:scale(1);
box-shadow:0 0 10px red inset,0 0 20px red;
}

}

#stats{ margin-top:10px; font-size:14px; }

#graph {
    height: 180px;
    display: flex;
    align-items: flex-end;
    gap: 2px;
    width: 400px;       /* fixed width so first pillar appears */
    max-width: 100%;    /* responsive if needed */
    position: relative;
    justify-content: flex-start; /* bars start from the left inside the container */
}

.bar{ flex:1; border-radius:3px; transition:0.15s; position:relative; }

.barLabel{
    position:absolute;
    bottom:-18px;
    width:100%;
    text-align:center;
    font-size:10px;
    color:#fff;
}

#rankBadge{ margin-top:8px; font-weight:bold; }

#leaderboard {
    position: relative;        /* normal flow, not fixed anymore */
    margin: 20px auto 30px auto;  /* top 20px from graph, bottom 30px spacing */
    width: fit-content;        /* only as wide as text */
    font-size: 14px;
    font-weight: bold;
    color: white;
    background: rgba(0,0,0,0.5); /* optional subtle background for separation */
    padding: 6px 15px;           /* soft padding around text */
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 10px rgba(255,255,255,0.2);
}

#graphContainer {
    display: flex;
    flex-direction: column; /* stack graph on top of leaderboard */
    align-items: center;    /* center horizontally */
    margin-top: 60px;       /* spacing from stats above */
}

#streakRewardBox{
    position:fixed;
    left:calc(50% + 240px); /* right side */
    top:50%;
    transform:translateY(-50%);
    text-align:center;
    max-width:450px;
    max-height:450px;
    z-index:1000;
}
#streakRewardBox img, #streakRewardBox video{
    max-width:130%; /* increased 30% */
    max-height:130%;
    border-radius:10px;
    box-shadow:0 0 30px rgba(0,255,255,0.6);
}

#rankBoom, #focusBanner {
    font-family: 'Orbitron', sans-serif;
    color: #00ffff;
    text-shadow: 0 0 10px #00ffff, 0 0 20px #ff00ff, 0 0 30px #ff00ff;
    font-weight: 900;
    font-size: 36px;       /* F is bigger than others automatically by vertical stacking */
    line-height: 1;        /* no extra spacing between letters */
    text-align: center;
    animation: pulseFocus 1.2s infinite alternate;
}
@keyframes pulseFocus {
    0%   { transform: scale(1); text-shadow: 0 0 10px #00ffff,0 0 20px #ff00ff; }
    50%  { transform: scale(1.1); text-shadow: 0 0 20px #00ffff,0 0 40px #ff00ff; }
    100% { transform: scale(1); text-shadow: 0 0 10px #00ffff,0 0 20px #ff00ff; }
}

#consistency {
    color: violet;
    font-weight: bold;
    text-shadow: 0 0 10px violet, 0 0 20px purple;
    animation: pulsePurple 1.5s infinite;
}

@keyframes pulsePurple {
    0% { text-shadow: 0 0 5px violet, 0 0 10px purple; transform: scale(1); }
    50% { text-shadow: 0 0 20px violet, 0 0 40px purple; transform: scale(1.1); }
    100% { text-shadow: 0 0 5px violet, 0 0 10px purple; transform: scale(1); }
}

#consistency:hover {
    text-shadow: 0 0 30px violet, 0 0 60px purple;
}

#photoRewardBox{
    position:fixed;
    left:calc(20px + 10px); /* 1cm to the right */
    top:50%;
    transform:translateY(-50%);
    text-align:center;
    z-index:1000;
}
#photoRewardBox img{
    max-width:320px;
    max-height:450px;
    border-radius:10px;
    box-shadow:0 0 30px rgba(0,255,255,0.6);
    opacity:0;
}
.sparkle{
    position:absolute;
    width:5px; height:5px;
    background:#fff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}
@keyframes spin{
    0%{transform:translate(0,0);}
    25%{transform:translate(5px,-5px);}
    50%{transform:translate(-5px,5px);}
    75%{transform:translate(3px,-3px);}
    100%{transform:translate(0,0);}
}

/* --- MOBILE STYLES --- */
@media (max-width: 768px) {

        font-size: 24px; /* slightly smaller font for small screens */
    }
    #graph {
        width: 95%;      /* graph scales with screen */
        gap:1px;
    }
}

</style>

function adaptiveDifficulty(){
    if(history.length<5) return;
    let avg=history.slice(-10).reduce((a,b)=>a+b)/Math.min(history.length,10);
    if(avg<150){ difficultyMin=800; difficultyMax=1500; fakeChance=0.35; }
    else if(avg<200){ difficultyMin=1000; difficultyMax=2200; fakeChance=0.25; }
    else if(avg>250){ difficultyMin=1800; difficultyMax=4000; fakeChance=0.1; }
}

    area.innerText="Wait for GREEN...";

delay -= streak*40;

    timeout=setTimeout(()=>{
        if(Math.random()<fakeChance){
            area.className="fakeReady";
            area.innerText="CLICK NOW!";
            state="fake";
            setTimeout(()=>{ if(state==="fake") startGame(); },500);
        } else{
            area.className="ready";
area.innerText="CLICK NOW!";

area.style.boxShadow="0 0 50px lime";
setTimeout(()=>area.style.boxShadow="none",40);

state="ready";

    },delay);
}

function reactionSound(rt){

let osc = audioCtx.createOscillator();
let gain = audioCtx.createGain();

osc.type="sine";

let pitch = Math.max(120, 600 - rt);
osc.frequency.value = pitch;

gain.gain.value = 0.05;

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();
osc.stop(audioCtx.currentTime+0.12);

}

function calculateConsistency() {
    if(history.length < 5) return "--";
    let avg = history.reduce((a,b)=>a+b)/history.length;
    let variance = history.reduce((a,b)=>a+Math.pow(b-avg,2),0)/history.length;
    let consistency = Math.max(0, 100 - Math.sqrt(variance));
    return Math.round(consistency);
}

function updatePersistentStats(rt){
    let data=loadLeaderboard();
    data.totalAttempts++;
    if(rt<300)data.totalWins++;
    if(data.bestEver===null || rt<data.bestEver) data.bestEver=rt;
    if(combo>data.bestCombo) data.bestCombo=combo;
    saveLeaderboard(data);
    updateLeaderboardDisplay();

function updateGraph(){
    graph.innerHTML="";
    history.forEach(t=>{
        let bar=document.createElement("div");
        bar.className="bar";
        bar.style.height=Math.max(10,180-t*0.5)+"px"; // scale for bigger graph
        bar.style.position="relative";

        // Color logic
        if(t > 300){
    bar.style.background="#ff0000";
}

if(t > 220) bar.style.background="#b0ffff";       // slow
else if(t > 200) bar.style.background="#ff9900";  // decent
else if(t > 190) bar.style.background="#ffee00";  // good
else if(t > 180) bar.style.background="#66ff00";  // great
else if(t > 170) bar.style.background="#00ffaa";  // nice
else if(t > 120) bar.style.background="#00ccff";  // pro
else if(t > 80) bar.style.background="#0077ff";   // elite
else if(t > 60){
bar.style.background="#ff00ff";                   // inhuman
bar.style.boxShadow="0 0 20px #ff00ff";
}
else if(t > 40){
bar.style.background="#ff0099";                   // masterclass
bar.style.boxShadow="0 0 25px #ff0099";
}
else{
bar.style.background="#00ffff";                   // legendary
bar.style.boxShadow="0 0 30px #00ffff,0 0 60px #00ffff";
}

        // Glow for low values
        if(t<150) bar.style.boxShadow="0 0 15px "+bar.style.background;

        // Score label
        let label=document.createElement("div");
        label.className="barLabel";
        label.innerText=t.toFixed(0);
        bar.appendChild(label);

        graph.appendChild(bar);
    });
    graph.animate([{transform:"scale(1)"},{transform:"scale(1.03)"},{transform:"scale(1)"}],{duration:250});
}

function animateComboPulse(){
    if(combo<2) return;
    graph.querySelectorAll(".bar").forEach(b=>{
        b.animate([{transform:"scale(1)"},{transform:`scale(${1+combo*0.02})`},{transform:"scale(1)"}],{duration:200});
    });
}

function updateRank(){
    let rate=attempts ? (sub300Wins/attempts)*100 : 0;
    if(rate>=80) rankBadge.innerText="🏆 Reflex Monster";
    else if(rate>=65) rankBadge.innerText="🔥 Elite Reactor";
    else if(rate>=50) rankBadge.innerText="⚡ Sharp";
    else if(rate>=35) rankBadge.innerText="👍 Average";
    else rankBadge.innerText="🐢 Training Needed";
}

function animatePixelAssemble(el){
    el.style.opacity=0;
    let opacity=0;
    let interval=setInterval(()=>{
        opacity+=0.05;
        el.style.opacity=opacity;
        if(opacity>=1) clearInterval(interval);
    },30);
}

function addSparkles(el){
    for(let i=0;i<8;i++){
        let s=document.createElement("div");
        s.className="sparkle";
        s.style.top=Math.random()*el.offsetHeight+"px";
        s.style.left=Math.random()*el.offsetWidth+"px";
        el.appendChild(s);
        setTimeout(()=>el.removeChild(s),1000);
    }
}

// ===== Mobile Safari / small screen adjustments =====
function isMobile() {
    return window.innerWidth <= 768;
}

function showMobileReward(el) {
    if(!isMobile()) return;

    // Hide game temporarily
    document.getElementById("gameBox").style.display = "none";

    // Show overlay
    let overlay = document.createElement("div");
    overlay.id = "mobileRewardOverlay";
    overlay.style.position = "fixed";
    overlay.style.top = "0";
    overlay.style.left = "0";
    overlay.style.width = "100vw";
    overlay.style.height = "100vh";
    overlay.style.background = "#000";
    overlay.style.display = "flex";
    overlay.style.justifyContent = "center";
    overlay.style.alignItems = "center";
    overlay.style.zIndex = 9999;
    overlay.appendChild(el);
    document.body.appendChild(overlay);

    // If image, auto remove after 2 seconds
    if(el.tagName.toLowerCase() === "img") {
        setTimeout(()=>{
            document.body.removeChild(overlay);
            document.getElementById("gameBox").style.display = "block";
        }, 2000);
    }

    // If video, remove overlay after video ends
    if(el.tagName.toLowerCase() === "video") {
        el.onended = ()=>{
            document.body.removeChild(overlay);
            document.getElementById("gameBox").style.display = "block";
        }
    }
}
